<!-- templates/login.html -->
{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 20px;">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Login to your account</p>
        </div>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa fa-user text-muted"></i>
                    </span>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa fa-lock text-muted"></i>
                    </span>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                </div>
            </div>

            <!-- LOGIN BUTTON -->
            <button class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="fa fa-sign-in-alt me-1"></i> Login
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-center mt-3">
            <small class="text-muted">
                Don't have an account?
                <a href="/register/" class="text-decoration-none fw-semibold">Register</a>
            </small>
        </div>

    </div>

</div>

{% endblock %}
