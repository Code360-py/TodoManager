<!-- templates/register.html -->
{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 420px; border-radius: 20px;">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Start managing your todos</p>
        </div>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa fa-user text-muted"></i>
                    </span>
                    <input type="text" name="username" class="form-control form-control-lg"
                           placeholder="Choose a username" required>
                </div>
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa fa-envelope text-muted"></i>
                    </span>
                    <input type="email" name="email" class="form-control form-control-lg"
                           placeholder="Enter your email" required>
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa fa-lock text-muted"></i>
                    </span>
                    <input type="password" name="password" class="form-control form-control-lg"
                           placeholder="Create a password" required>
                </div>
            </div>

            <!-- SUBMIT -->
            <button class="btn btn-success w-100 py-2 fw-semibold">
                <i class="fa fa-user-plus me-1"></i> Register
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-center mt-3">
            <small class="text-muted">
                Already have an account?
                <a href="/login/" class="text-decoration-none fw-semibold">Login</a>
            </small>
        </div>

    </div>

</div>

{% endblock %}
